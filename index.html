<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIELO</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f5;
      --warm-white: #f5f2ee;
      --charcoal: #1a1a1a;
      --mid: #6b6560;
      --accent: #c9a96e;
      --border: #e8e3dc;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      font-weight: 300;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 72px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--charcoal);
      text-decoration: none;
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 10px;
    }
    .logo span { color: inherit; font-style: normal; }
    .logo-sub {
      font-family: 'Jost', sans-serif;
      font-size: 0.52rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      font-weight: 300;
    }

    .cart-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 8px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--charcoal);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cart-btn:hover { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }
    .cart-count {
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center;
      font-weight: 500;
    }

    /* ══════════════════════════════
   FRANJA DE VIDEOS — ESTILO PRO
   ══════════════════════════════ */

   .video-banner-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      background: #1a1a1a;
    }

    /* Cada video */
    .video-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }

    /* Video */
    .video-banner-grid video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease, opacity 0.4s ease;
    }

    /* El video grande */
    .video-banner-grid .video-item:nth-child(1) {
      grid-row: span 2;
    }

    /* Hover pro */
    .video-item:hover video {
      transform: scale(1.03);
      opacity: 0.95;
    }

    /* Texto encima */
    .video-text {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      z-index: 2;
    }

    .video-text p {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .video-text h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
    }

    /* Oscurecer un poco para que el texto se vea mejor */
   .video-item::after {
       content: "";
       position: absolute;
       inset: 0;
       background: linear-gradient(
         to top,
         rgba(0,0,0,0.5),
          transparent
        );
    }

    /* MOBILE */
   @media (max-width: 600px) {
   .video-banner-grid {
     grid-template-columns: 1fr 1fr;
     grid-template-rows: auto;
    }

   .video-banner-grid .video-item:nth-child(1) {
     grid-column: span 2;
    }

    .video-banner-grid video {
        height: 180px;
    }
}

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      border-bottom: 1px solid var(--border);
    }
    .hero-tag {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--charcoal);
      margin-bottom: 18px;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p {
      font-size: 0.9rem;
      color: var(--mid);
      letter-spacing: 0.05em;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ══════════════════════════════
       TABS DE CATEGORÍAS
    ══════════════════════════════ */
    .categories-bar {
      display: flex;
      align-items: center;
      padding: 0 5vw;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categories-bar::-webkit-scrollbar { display: none; }

    .cat-tab {
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 20px 22px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .cat-tab:hover { color: var(--charcoal); }
    .cat-tab.active {
      color: var(--charcoal);
      border-bottom-color: var(--charcoal);
      font-weight: 500;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 48px 5vw 30px;
    }
    .section-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 400;
      white-space: nowrap;
    }
    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      background: var(--charcoal);
      border-top: 12px solid var(--charcoal);
      border-bottom: 12px solid var(--charcoal);
      padding: 0 12px;
      min-height: 200px;
    }

    .no-products {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--mid);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      background: var(--cream);
    }

    /* ── CARD ── */
    .card {
      background: var(--cream);
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }
    .card:hover { background: var(--warm-white); }

    .card-image {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--warm-white);
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .card:hover .card-image img { transform: scale(1.04); }

    /* VIDEO HOVER PRO */

    .video-hover {
       position: absolute;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       object-fit: cover;

       opacity: 0;
        transition: opacity 0.5s ease; /* ← fade elegante */
        pointer-events: none;
    }

    .card-image:hover .video-hover {
       opacity: 1;
    }

    .card-image:hover .img-main {
       opacity: 0;
    }

    .card-image .img-main {
       transition: opacity 0.5s ease, transform 0.6s ease;
    }

    .card-image:hover .img-main {
       transform: scale(1.02);
    }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--mid);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 2px dashed var(--border);
    }
    .img-placeholder svg { opacity: 0.4; }

    .tag-nuevo {
      position: absolute;
      top: 14px; left: 14px;
      background: var(--charcoal);
      color: var(--cream);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 10px;
    }

    .card-info {
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--charcoal);
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--mid);
      letter-spacing: 0.03em;
      line-height: 1.6;
      flex: 1;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 500;
    }
    .card-price .currency {
      font-size: 0.85rem;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--mid);
      margin-right: 3px;
    }

    .btn-comprar {
      background: var(--charcoal);
      color: var(--cream);
      border: none;
      padding: 10px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
    }
    .btn-comprar:hover { background: var(--accent); }
    .btn-comprar:active { transform: scale(0.97); }
    .btn-comprar.added { background: #4caf50; pointer-events: none; }

    /* ── CARRITO LATERAL ── */
    .cart-panel {
      position: fixed;
      right: -420px; top: 0;
      width: min(420px, 100vw);
      height: 100vh;
      background: var(--cream);
      border-left: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transition: right 0.4s cubic-bezier(.4,0,.2,1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.08);
    }
    .cart-panel.open { right: 0; }

    .cart-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 199;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-header h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 400;
    }
    .close-cart {
      background: none; border: none; cursor: pointer;
      color: var(--mid); font-size: 1.4rem; line-height: 1;
      transition: color 0.2s;
    }
    .close-cart:hover { color: var(--charcoal); }

    .cart-items {
      flex: 1; overflow-y: auto;
      padding: 20px 28px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .cart-empty {
      text-align: center; color: var(--mid);
      font-size: 0.85rem; letter-spacing: 0.05em;
      margin-top: 60px;
    }
    .cart-empty svg { margin-bottom: 16px; opacity: 0.3; display: block; margin-left: auto; margin-right: auto; }

    .cart-item {
      display: flex; gap: 14px; align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-thumb {
      width: 64px; height: 80px;
      object-fit: cover;
      background: var(--warm-white);
      flex-shrink: 0;
    }
    .cart-item-thumb.no-img {
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; margin-bottom: 4px;
    }
    .cart-item-price { font-size: 0.8rem; color: var(--mid); }
    .cart-item-qty {
      display: flex; align-items: center; gap: 8px; margin-top: 8px;
    }
    .qty-btn {
      width: 24px; height: 24px;
      border: 1px solid var(--border);
      background: none; cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .qty-btn:hover { background: var(--charcoal); color: var(--cream); }
    .qty-num { font-size: 0.85rem; min-width: 20px; text-align: center; }
    .remove-item {
      background: none; border: none; cursor: pointer;
      color: var(--mid); font-size: 1.1rem;
      transition: color 0.2s;
    }
    .remove-item:hover { color: #c0392b; }

    .cart-footer {
      padding: 20px 28px 28px;
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .cart-total span:first-child {
      font-size: 0.78rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--mid);
    }
    .cart-total-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
    }

    .btn-whatsapp {
      width: 100%;
      background: #25D366; color: #fff;
      border: none; padding: 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.25s, transform 0.15s;
    }
    .btn-whatsapp:hover { background: #1ebe5d; }
    .btn-whatsapp:active { transform: scale(0.98); }
    .btn-whatsapp:disabled { background: var(--border); color: var(--mid); cursor: not-allowed; }

    .btn-clear {
      width: 100%;
      background: none; border: 1px solid var(--border);
      padding: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--mid); cursor: pointer; margin-top: 10px;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: #c0392b; color: #c0392b; }

    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem; letter-spacing: 0.1em; color: var(--mid);
    }

    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--charcoal); color: var(--cream);
      padding: 12px 24px;
      font-size: 0.8rem; letter-spacing: 0.08em;
      opacity: 0;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .hero { padding: 50px 16px 40px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .video-banner { height: 260px; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->

  <a href="#" class="logo">TIELO<span class="logo-sub">Prendas Urbanas</span></a>
  <button class="cart-btn" onclick="toggleCart()">

<script>
  // ══════════════════════════════════════════════════
  //  ✏️  CONFIGURACIÓN
  // ══════════════════════════════════════════════════
  const WHATSAPP_NUMBER = "5492246442320";
  const TIENDA_NOMBRE   = "TIELO";

  // ══════════════════════════════════════════════════
  //  🎬  VIDEOS
  //  Reemplazá el "" con la ruta de tu video.
  //  Los videos tienen que estar guardados en la misma
  //  carpeta que este archivo HTML, o en una subcarpeta.
  //  Ejemplo: "videos/lookbook1.mp4"
  // ══════════════════════════════════════════════════
  const videoSrcs = [
    "videos/look1.mp4",
    "videos/look2.mp4",
    "videos/look3.mp4"
  ];

  // ══════════════════════════════════════════════════
  //  🛍️  PRODUCTOS
  //  categoria → "jeans" | "sweaters" | "remeras" | "carteras"
  //  Para agregar más, copiá un bloque { ... } y pegalo
  //  asegurandote de cambiar el id por un número nuevo.
  // ══════════════════════════════════════════════════
  const productos = [

    // ── JEANS ──────────────────────────────────────
    {
      id: 1,
      nombre: "Jeans mom Encanto",

  // ══════════════════════════════════════════════════
  //  LÓGICA — no necesitás tocar nada de acá abajo
  // ══════════════════════════════════════════════════

  // ── Videos ──────────────────────────────────────
  let currentVideo = 0;
  let videoTimer   = null;

  function initVideos() {
    videoSrcs.forEach((src, i) => {
      const vid = document.getElementById(`video${i}`);
      const ph  = document.getElementById(`ph${i}`);
      if (src) {
        vid.src = src;
        vid.style.display = "block";
        ph.style.display  = "none";
        vid.onended = () => advanceVideo();
      } else {
        vid.style.display = "none";
        ph.style.display  = "flex";
      }
    });
    goToVideo(0);
  }

  function goToVideo(index) {
    clearTimeout(videoTimer);
    // pausar anterior
    const prev = document.getElementById(`video${currentVideo}`);
    if (prev) { prev.pause(); prev.currentTime = 0; }

    currentVideo = index;

    // mover el track
    document.getElementById("videoTrack").style.transform =
      `translateX(-${index * 33.333}%)`;

    // dots
    document.querySelectorAll(".video-dot").forEach((d, i) => {
      d.classList.toggle("active", i === index);
    });

    // reproducir o temporizador
    const vid = document.getElementById(`video${index}`);
    if (videoSrcs[index]) {
      vid.play().catch(() => {});
      // onended ya está seteado en initVideos
    } else {
      // no hay video: avanza solo después de 4s
      videoTimer = setTimeout(() => advanceVideo(), 4000);
    }
  }

  function advanceVideo() {
    goToVideo((currentVideo + 1) % 3);
  }

  // ── Categorías ──────────────────────────────────
  let categoriaActiva = "todos";

  const catLabels = {
    todos: "Todo",
    jeans: "Jeans",
    sweaters: "Sweaters",
    remeras: "Remeras",
    carteras: "Carteras"
  };

  function setCategory(cat, btn) {
    categoriaActiva = cat;
    document.querySelectorAll(".cat-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("sectionTitle").textContent = catLabels[cat];
    renderProducts();
  }

  // ── Productos ───────────────────────────────────
  let cart = [];

  function formatPrice(n) {
    return "$" + Number(n).toLocaleString("es-AR");
  }

  function renderProducts() {
  const grid  = document.getElementById("productsGrid");
  const lista = categoriaActiva === "todos"
    ? productos
    : productos.filter(p => p.categoria === categoriaActiva);

  if (lista.length === 0) {
    grid.innerHTML = `<div class="no-products">Próximamente en esta categoría ✦</div>`;
    return;
  }

  grid.innerHTML = lista.map(p => `
    <div class="card" id="card-${p.id}">

      <div class="card-image">

        ${p.imagen
          ? `<img src="${p.imagen}" class="img-main" alt="${p.nombre}" onerror="this.parentElement.innerHTML=noImgHTML()">`
          : `<div class="img-placeholder">
              <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
              <span>Sin imagen</span>
             </div>`
          }

         ${p.video
            ? `<video class="video-hover" src="${p.video}" muted loop playsinline></video>`
            : ""
          }

          ${p.nuevo ? '<span class="tag-nuevo">Nuevo</span>' : ''}

        </div>

        <div class="card-info">
          <p class="card-name">${p.nombre}</p>
          <p class="card-desc">${p.desc}</p>

          <div class="card-bottom">
            <p class="card-price">
              <span class="currency">$</span>${Number(p.precio).toLocaleString("es-AR")}
            </p>

            <button class="btn-comprar" id="btn-${p.id}" onclick="addToCart(${p.id})">
              Agregar
            </button>
          </div>
        </div>

      </div>
    `).join("");
  }

  function noImgHTML() {
    return `<div class="img-placeholder">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg><span>Sin imagen</span></div>`;
  }

  function addToCart(id) {
    const prod = productos.find(p => p.id === id);
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...prod, qty: 1 });
    updateCartUI();
    showToast(`"${prod.nombre}" agregado al carrito`);
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
      btn.classList.add("added");
      btn.textContent = "✓ Agregado";
      setTimeout(() => { btn.classList.remove("added"); btn.textContent = "Agregar"; }, 1500);
    }
  }

  function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.precio * i.qty, 0);
    document.getElementById("cartCount").textContent  = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById("cartTotal").textContent  = formatPrice(total);
    document.getElementById("btnWA").disabled         = cart.length === 0;

    const itemsEl = document.getElementById("cartItems");
    if (cart.length === 0) {
      itemsEl.innerHTML = `<div class="cart-empty">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <p>Tu carrito está vacío</p>
      </div>`;
      return;
    }

    itemsEl.innerHTML = cart.map(item => `
      <div class="cart-item">
        ${item.imagen
          ? `<img class="cart-item-thumb" src="${item.imagen}" alt="${item.nombre}">`
          : `<div class="cart-item-thumb no-img">👗</div>`}
        <div class="cart-item-info">
          <p class="cart-item-name">${item.nombre}</p>
          <p class="cart-item-price">${formatPrice(item.precio)} c/u</p>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>
        <button class="remove-item" onclick="removeItem(${item.id})" title="Eliminar">✕</button>
      </div>
    `).join("");
  }

  function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeItem(id); else updateCartUI();
  }
  function removeItem(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
  function clearCart()    { cart = []; updateCartUI(); }

  function toggleCart() {
    document.getElementById("cartPanel").classList.toggle("open");
    document.getElementById("cartOverlay").classList.toggle("open");
  }

  function sendToWhatsApp() {
    if (cart.length === 0) return;
    const total = cart.reduce((s, i) => s + i.precio * i.qty, 0);
    const lines = cart.map(i => `• ${i.nombre} x${i.qty} — ${formatPrice(i.precio * i.qty)}`).join("\n");
    const msg   = `¡Hola ${TIENDA_NOMBRE}! 👋 Me gustaría hacer el siguiente pedido:\n\n${lines}\n\n*Total: ${formatPrice(total)}*\n\n¿Podemos coordinar la compra?`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  document.addEventListener("mouseover", e => {
  const card = e.target.closest(".card");
  if (!card) return;

  const video = card.querySelector(".video-hover");
  if (video) video.play();
});

document.addEventListener("mouseout", e => {
  const card = e.target.closest(".card");
  if (!card) return;

  const video = card.querySelector(".video-hover");
  if (video) {
    video.pause();
    video.currentTime = 0;
  }
});

  // Init
  initVideos();
  renderProducts();
  updateCartUI();
</script>
